# configs/scanobj_cls.yaml — ScanObjectNN PB-T50-RS classification
# Target: 85-88% Overall Accuracy

# ── Dataset ────────────────────────────────────────────────────────────
dataset: scanobjectnn
data_dir: data/ScanObjectNN/main_split
variant: PB_T50_RS
num_points: 2048
num_classes: 15

# ── Slicing ────────────────────────────────────────────────────────────
num_slices: 16
points_per_slice: 128
geo_dim: 8

# ── Model ──────────────────────────────────────────────────────────────
feat_dim: 512
k_edge: 20
transformer_heads: 4
transformer_ffn_dim: 1024
hidden_dim: 512
num_lif_layers: 3
lif_leak: 0.9
lif_threshold: 1.0
d_ssp: 128
T: 6
exit_threshold: 0.40

# ── Classification head ────────────────────────────────────────────────
# 3-layer MLP head instead of single Linear (research finding: +1-2%)
cls_head_dims: [256, 128]
cls_head_dropout: [0.5, 0.3]

# ── Training ───────────────────────────────────────────────────────────
epochs: 500
batch_size: 32
lr: 4e-4
weight_decay: 0.01
grad_clip: 1.0
warmup_epochs: 20
label_smooth: 0.1
use_amp: true

# ── SWA ────────────────────────────────────────────────────────────────
use_swa: true
swa_start_frac: 0.75
swa_lr: 5e-5

# ── Gumbel temperature ─────────────────────────────────────────────────
tau_start: 1.0
tau_end: 0.1
tau_decay: 0.95

# ── Augmentation (aggressive for real-world data) ──────────────────────
aug_rotate_so3: true
aug_scale_lo: 0.67
aug_scale_hi: 1.5
aug_translate: 0.2
aug_jitter_sigma: 0.02
aug_jitter_clip: 0.05
aug_point_dropout: 0.3
aug_slice_dropout: 0.15

# ── Test-time augmentation ─────────────────────────────────────────────
n_votes: 10

# ── Logging ────────────────────────────────────────────────────────────
eval_interval: 1
log_dir: logs
ckpt_dir: checkpoints
seed: 42
num_workers: 4
