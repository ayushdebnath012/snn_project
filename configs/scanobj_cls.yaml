# configs/scanobj_cls.yaml — ScanObjectNN PB-T50-RS classification
# Target: 82-87% Overall Accuracy

# ── Dataset ────────────────────────────────────────────────────────────
dataset: scanobjectnn
data_dir: data/ScanObjectNN/main_split
variant: PB_T50_RS
num_points: 2048
num_classes: 15

# ── Slicing ────────────────────────────────────────────────────────────
num_slices: 16
points_per_slice: 128
geo_dim: 8

# ── Model ──────────────────────────────────────────────────────────────
feat_dim: 512
k_edge: 20
transformer_heads: 4
transformer_ffn_dim: 1024
hidden_dim: 512
slice_pool: meanmax
slice_token_dropout: 0.05
num_lif_layers: 3
lif_leak: 0.9
lif_threshold: 1.0
d_ssp: 128
T: 6
exit_threshold: 0.40

# ── Classification head ────────────────────────────────────────────────
# 3-layer MLP head; reduced dropout from 0.5/0.3 → 0.3/0.2 to allow
# better generalization on already-augmented PB-T50-RS data
cls_head_dims: [256, 128]
cls_head_dropout: [0.3, 0.2]

# ── Training ───────────────────────────────────────────────────────────
epochs: 300
batch_size: 32
lr: 0.0004
weight_decay: 0.01
grad_clip: 1.0
warmup_epochs: 20
label_smooth: 0.1
use_amp: true

# ── SWA ────────────────────────────────────────────────────────────────
use_swa: true
swa_start_frac: 0.75
swa_lr: 0.00005

# ── Gumbel temperature ─────────────────────────────────────────────────
tau_start: 1.0
tau_end: 0.1
tau_decay: 0.95

# ── Augmentation (TUNED FOR PB-T50-RS) ─────────────────────────────────
# Critical: PB-T50-RS data is ALREADY rotated+scaled+perturbed (the "RS" in
# the name).  Adding heavy SO(3) rotation on top creates a distribution far
# from the test set and was a major source of poor test accuracy.
# Use only LIGHT additional augmentation here.
aug_rotate_so3: false    # Was true — too much, data already rotated
aug_rotate_z: true       # Light z-axis rotation only
aug_scale_lo: 0.85       # Was 0.67 — too aggressive
aug_scale_hi: 1.15       # Was 1.5
aug_translate: 0.1       # Was 0.2 — too much
aug_jitter_sigma: 0.01   # Was 0.02
aug_jitter_clip: 0.05
aug_point_dropout: 0.2   # Was 0.3
aug_slice_dropout: 0.1   # Was 0.15
aug_anisotropic_scale: false
aug_tilt: 0.0
aug_elastic: false

# ── Test-time augmentation ─────────────────────────────────────────────
n_votes: 10
logit_ensemble: 3

# ── Logging ────────────────────────────────────────────────────────────
eval_interval: 1
log_dir: logs
ckpt_dir: checkpoints
seed: 42
num_workers: 8
